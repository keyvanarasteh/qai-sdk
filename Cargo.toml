[package]
name = "qai-sdk"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
qai-core = { path = "qai-core" }
qai-anthropic = { path = "qai-anthropic" }
qai-google = { path = "qai-google" }
qai-openai = { path = "qai-openai" }
qai-deepseek = { path = "qai-deepseek" }
qai-xai = { path = "qai-xai" }
qai-openai-compatible = { path = "qai-openai-compatible" }
tokio = { workspace = true }
futures = { workspace = true }
anyhow = { workspace = true }
dotenvy = "0.15"

[workspace]
members = ["qai-anthropic", "qai-core", "qai-deepseek", "qai-google", "qai-openai", "qai-openai-compatible", "qai-test-utils", "qai-xai"]
resolver = "2"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", features = ["json", "stream", "multipart"] }
tokio = { version = "1.0", features = ["full"] }
futures = "0.3"
async-trait = "0.1"
anyhow = "1.0"
thiserror = "1.0"
